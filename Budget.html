<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinective — Consolidated Budget 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f5f5f7;
    --surface:     #ffffff;
    --ink:         #1d1d1f;
    --secondary:   #6e6e73;
    --tertiary:    #aeaeb2;
    --border:      #d2d2d7;
    --border-dark: #b0b0b8;
    --blue:        #0071e3;
    --dark-blue:   #1F3864;
    --mid-blue:    #2F5496;
    --light-blue:  #deeaf1;
    --yellow:      #fff9e6;
    --yellow-dark: #ffe066;
    --green-bg:    #f0faf3;
    --green:       #1a6b2a;
    --red-bg:      #fff0ee;
    --red:         #c0392b;
    --font:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow: hidden; /* we control scroll ourselves */
  }

  /* ── Top nav ──────────────────────────────────────────────────────── */
  .topbar {
    height: 52px;
    background: rgba(245,245,247,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
  }
  .topbar-back {
    font-size: 0.8rem;
    color: var(--blue);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .topbar-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    flex: 1;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .last-updated {
    font-size: 0.72rem;
    color: var(--secondary);
    white-space: nowrap;
  }
  .btn-refresh {
    padding: 6px 14px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-refresh:hover { background: #0077ed; }
  .btn-refresh:disabled { background: var(--tertiary); cursor: default; }

  /* ── Controls bar ────────────────────────────────────────────────── */
  .controls {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    position: fixed;
    top: 52px; left: 0; right: 0;
    z-index: 199;
  }
  .toggle-group {
    display: flex;
    background: var(--bg);
    border-radius: 7px;
    padding: 2px;
    gap: 2px;
  }
  .toggle-btn {
    padding: 4px 12px;
    border: none;
    border-radius: 5px;
    font-family: var(--font);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--secondary);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .toggle-btn.active {
    background: var(--dark-blue);
    color: white;
  }
  .controls-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .search-input {
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-family: var(--font);
    font-size: 0.75rem;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--blue); background: white; }
  .controls-spacer { flex: 1; }
  .ytd-label {
    font-size: 0.72rem;
    color: var(--secondary);
    background: var(--yellow);
    border: 1px solid var(--yellow-dark);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── Summary cards ───────────────────────────────────────────────── */
  .summary-bar {
    position: fixed;
    top: 96px; left: 0; right: 0;
    height: 80px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    z-index: 198;
    overflow-x: auto;
  }
  .summary-card {
    flex-shrink: 0;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 16px;
    min-width: 160px;
    border-left: 3px solid var(--mid-blue);
  }
  .summary-card.profit { border-left-color: var(--green); }
  .summary-card.loss   { border-left-color: var(--red);   }
  .sc-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--secondary); margin-bottom: 4px; }
  .sc-value { font-size: 1.05rem; font-weight: 700; color: var(--ink); line-height: 1; }
  .sc-sub   { font-size: 0.68rem; color: var(--secondary); margin-top: 3px; }
  .sc-var   { display: inline-block; font-size: 0.68rem; font-weight: 600; padding: 1px 6px; border-radius: 10px; margin-top: 3px; }
  .sc-var.pos { background: #d4edda; color: var(--green); }
  .sc-var.neg { background: #fadbd8; color: var(--red);   }
  .sc-var.neu { background: var(--border); color: var(--secondary); }

  /* ── Main table wrapper ──────────────────────────────────────────── */
  .table-wrapper {
    position: fixed;
    top: 176px; /* topbar(52) + controls(44) + summary(80) */
    left: 0; right: 0; bottom: 0;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Table ───────────────────────────────────────────────────────── */
  table {
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.8rem;
    min-width: max-content;
    width: 100%;
  }

  /* Sticky header rows */
  thead tr:first-child th {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--dark-blue);
    color: white;
    padding: 9px 10px;
    text-align: center;
    font-weight: 600;
    font-size: 0.72rem;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  thead tr:last-child th {
    position: sticky;
    top: 36px;
    z-index: 50;
    background: var(--mid-blue);
    color: white;
    padding: 6px 10px;
    text-align: center;
    font-weight: 500;
    font-size: 0.68rem;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.12);
    border-bottom: 2px solid var(--border-dark);
  }
  thead tr:last-child th.th-real  { color: #ffff99; }
  thead tr:last-child th.th-var   { color: #ffdd88; background: #243e6e; }

  /* Sticky label column */
  th.col-label, td.col-label {
    position: sticky;
    left: 0;
    z-index: 40;
    min-width: 220px;
    max-width: 220px;
    width: 220px;
    text-align: left !important;
    border-right: 2px solid var(--border-dark) !important;
  }
  thead tr:first-child th.col-label { z-index: 60; }
  thead tr:last-child  th.col-label { z-index: 60; text-align: left !important; padding-left: 14px; }

  /* Summary cols sticky right-ish — just style differently */
  th.th-summary { background: #162a50 !important; }
  th.th-summary-sub { background: #1e3a6e !important; }

  /* Data cells */
  td {
    padding: 6px 10px;
    text-align: right;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td.col-label {
    text-align: left;
    padding-left: 14px;
    font-weight: 400;
    background: white;
    border-right: 2px solid var(--border-dark) !important;
  }

  /* ── Row types ───────────────────────────────────────────────────── */
  tr.row-sec td {
    background: var(--dark-blue);
    color: white;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.03em;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  tr.row-sec td.col-label {
    background: var(--dark-blue);
    color: white;
    cursor: pointer;
    user-select: none;
    padding-left: 14px;
  }

  tr.row-sub td {
    background: var(--light-blue);
    font-weight: 600;
    border-bottom: 1px solid #b8cfe0;
  }
  tr.row-sub td.col-label {
    background: var(--light-blue);
    cursor: pointer;
    user-select: none;
  }

  tr.row-tot td {
    background: var(--yellow);
    font-weight: 700;
    border-top: 2px solid var(--dark-blue);
    border-bottom: 2px solid var(--dark-blue);
  }
  tr.row-tot td.col-label { background: var(--yellow); }

  tr.row-dat:nth-child(even) td            { background: #fafafa; }
  tr.row-dat:nth-child(odd)  td            { background: white; }
  tr.row-dat:nth-child(even) td.col-label  { background: #fafafa; }
  tr.row-dat:nth-child(odd)  td.col-label  { background: white; }
  tr.row-dat:hover td { background: #eef4fb !important; }

  /* Indent levels */
  tr.level-1 td.col-label { padding-left: 22px; }
  tr.level-2 td.col-label { padding-left: 34px; }
  tr.level-3 td.col-label { padding-left: 46px; }

  /* Variance cells */
  td.var-pos { color: var(--green); font-weight: 600; }
  td.var-neg { color: var(--red);   font-weight: 600; }
  td.var-neu { color: var(--tertiary); }

  /* Collapse toggle */
  .toggle-icon {
    display: inline-block;
    margin-right: 6px;
    font-size: 0.65rem;
    opacity: 0.7;
    transition: transform 0.15s;
  }
  tr.collapsed .toggle-icon { transform: rotate(-90deg); }

  /* Hidden rows */
  tr.group-hidden { display: none; }

  /* ── Loading overlay ─────────────────────────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(245,245,247,0.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 14px;
  }
  .overlay.hidden { display: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--dark-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text  { font-size: 0.9rem; color: var(--secondary); font-weight: 500; }
  .overlay-error {
    background: #fff0ee; border: 1px solid #f0b0a0;
    color: var(--red); padding: 12px 20px; border-radius: 8px;
    max-width: 420px; text-align: center; font-size: 0.85rem;
    display: none;
  }

  @media (max-width: 640px) {
    .topbar-title { font-size: 0.8rem; }
    th.col-label, td.col-label { min-width: 160px; max-width: 160px; width: 160px; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">Loading budget data…</div>
  <div class="overlay-error" id="overlayError"></div>
</div>

<!-- Top nav -->
<div class="topbar">
  <a class="topbar-back" href="https://kingzilos.github.io/-kinective-tools/">← Tools</a>
  <div class="topbar-title">Consolidated Budget 2026</div>
  <div class="topbar-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="btn-refresh" id="refreshBtn" onclick="fetchData()">⟳ Refresh</button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="toggle-group">
    <button class="toggle-btn active" id="v-ep"  onclick="setView('ep_plano')">EP + Plano</button>
    <button class="toggle-btn"        id="v-all" onclick="setView('all')">EP + Plano + AMD</button>
  </div>
  <div class="controls-sep"></div>
  <div class="toggle-group">
    <button class="toggle-btn active" id="t-monthly" onclick="setTab('monthly')">Monthly</button>
    <button class="toggle-btn"        id="t-ytd"     onclick="setTab('ytd')">YTD</button>
    <button class="toggle-btn"        id="t-fy"      onclick="setTab('fy')">Full Year</button>
  </div>
  <div class="controls-spacer"></div>
  <span class="ytd-label" id="ytdLabel"></span>
  <input class="search-input" type="text" placeholder="🔍 Search…" oninput="doSearch(this.value)">
</div>

<!-- Summary cards -->
<div class="summary-bar" id="summaryBar"></div>

<!-- Table -->
<div class="table-wrapper" id="tableWrapper">
  <table id="mainTable">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const EDGE = "https://jbqvtnukspnlpxgosmhp.supabase.co/functions/v1/budget-data";
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let data       = null;
let view       = "ep_plano";
let tab        = "monthly";
let searchTerm = "";

// YTD = previous month (data not filled until 1st of next month)
// currentMonth from API is 0-based (March = 2), so YTD = months 0..(currentMonth-1)
// i.e. ytdMonths = currentMonth (count of complete months)
let ytdMonths  = 0; // set after data loads

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function fetchData() {
  showOverlay("Loading budget data…");
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.textContent = "Loading…";
  try {
    const res = await fetch(EDGE);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
    if (data.error) throw new Error(data.error);

    // YTD = completed months only (previous month)
    // currentMonth is 0-based. If March (2), completed = Jan+Feb = 2 months = indices 0,1
    ytdMonths = data.currentMonth; // e.g. 2 means sum months[0..1]

    hideOverlay();
    document.getElementById("lastUpdated").textContent =
      "Updated " + new Date(data.lastUpdated).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    updateYtdLabel();
    renderSummary();
    renderTable();
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "⟳ Refresh";
  }
}

function updateYtdLabel() {
  const el = document.getElementById("ytdLabel");
  if (ytdMonths === 0) { el.textContent = "YTD: No complete months yet"; return; }
  el.textContent = `YTD through ${MONTHS[ytdMonths - 1]}`;
}

// ── View / Tab ─────────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById("v-ep").classList.toggle("active",  v === "ep_plano");
  document.getElementById("v-all").classList.toggle("active", v === "all");
  if (data) { renderSummary(); renderTable(); }
}
function setTab(t) {
  tab = t;
  ["monthly","ytd","fy"].forEach(x =>
    document.getElementById("t-"+x).classList.toggle("active", t === x));
  if (data) renderTable();
}

// ── Format ─────────────────────────────────────────────────────────────────────
function fmt(n, isTot) {
  if (n === null || n === undefined) return "—";
  const abs = Math.abs(Math.round(n));
  const s   = abs.toLocaleString("en-US");
  const val = n < 0 ? `(${s})` : s;
  return isTot ? `$${val}` : val;
}
function pct(real, bud) {
  if (!bud) return { text: "—", cls: "var-neu" };
  const p = ((real - bud) / Math.abs(bud)) * 100;
  if (!isFinite(p)) return { text: "—", cls: "var-neu" };
  return { text: (p >= 0 ? "+" : "") + p.toFixed(1) + "%", cls: p >= 0 ? "var-pos" : "var-neg" };
}
function vkey(suffix) { return view === "ep_plano" ? `ep_plano_${suffix}` : `all_${suffix}`; }

// ── Summary ────────────────────────────────────────────────────────────────────
function renderSummary() {
  const rows = data.rows;
  const find = lbl => rows.find(r => r.label && r.label.toLowerCase().trim() === lbl.toLowerCase().trim());

  const src = tab === "fy" ? "fullYear" : "ytd";
  const vk  = view === "ep_plano" ? "ep_plano" : "all";

  const cards = [
    { title: "Total Revenue",  row: find("TOTAL REVENUES") },
    { title: "Total Expenses", row: find("TOTAL EXPENSES") },
    { title: "Net Profit",     row: find("NET PROFIT")     },
  ];

  const html = cards.map(c => {
    if (!c.row || !c.row[src]) return "";
    const d  = c.row[src][vk];
    const v  = pct(d.real, d.budget);
    const isProfit = c.title === "Net Profit";
    const cls = isProfit ? (d.real >= 0 ? "profit" : "loss") : "";
    return `<div class="summary-card ${cls}">
      <div class="sc-label">${c.title} ${tab === "fy" ? "(Full Year)" : "(YTD)"}</div>
      <div class="sc-value">${fmt(d.real, true)}</div>
      <div class="sc-sub">Budget: ${fmt(d.budget, true)}</div>
      <span class="sc-var ${v.cls}">${v.text}</span>
    </div>`;
  }).join("");
  document.getElementById("summaryBar").innerHTML = html;
}

// ── Table ──────────────────────────────────────────────────────────────────────
function renderTable() {
  renderHead();
  renderBody();
}

function renderHead() {
  const thead = document.getElementById("thead");
  const isTot = (rtype) => rtype === "tot";

  if (tab === "monthly") {
    let r1 = `<tr><th class="col-label" rowspan="2">Line Item</th>`;
    MONTHS.forEach((m, i) => {
      const cur = i === (data.currentMonth);
      r1 += `<th colspan="3" style="${cur ? 'background:#162a50' : ''}">${m}</th>`;
    });
    r1 += `<th colspan="3" class="th-summary">YTD (thru ${ytdMonths > 0 ? MONTHS[ytdMonths-1] : "—"})</th>`;
    r1 += `<th colspan="3" class="th-summary">Full Year</th></tr>`;

    let r2 = `<tr><th class="col-label">—</th>`;
    for (let i = 0; i < 14; i++) { // 12 months + YTD + FY
      const isSummary = i >= 12;
      r2 += `<th class="${isSummary ? 'th-summary-sub' : ''}">Bud</th>`;
      r2 += `<th class="th-real ${isSummary ? 'th-summary-sub' : ''}">Real</th>`;
      r2 += `<th class="th-var ${isSummary ? 'th-summary-sub' : ''}">Var%</th>`;
    }
    r2 += `</tr>`;
    thead.innerHTML = r1 + r2;
  } else {
    const lbl = tab === "ytd"
      ? `YTD (thru ${ytdMonths > 0 ? MONTHS[ytdMonths-1] : "—"})`
      : "Full Year";
    thead.innerHTML = `
      <tr>
        <th class="col-label" rowspan="2">Line Item</th>
        <th colspan="3" class="th-summary">${lbl}</th>
      </tr>
      <tr>
        <th class="col-label" style="display:none"></th>
        <th>Budget</th>
        <th class="th-real">Real</th>
        <th class="th-var">Var %</th>
      </tr>`;
  }
}

function renderBody() {
  const tbody  = document.getElementById("tbody");
  const rows   = data.rows;
  const vk     = view === "ep_plano" ? "ep_plano" : "all";
  const search = searchTerm.toLowerCase().trim();

  // Group tracking for collapse
  let currentSecId  = null;
  let currentSubId  = null;
  let html          = "";
  let altIdx        = 0;

  rows.forEach((row, ri) => {
    if (!row) return;
    const { label, type, level } = row;
    if (!label) return;

    // Search filter (skip section/total headers when searching)
    if (search && type !== "sec" && !label.toLowerCase().includes(search)) return;

    const isTot = type === "tot";
    const isSec = type === "sec";
    const isSub = type === "sub";

    const rowId   = `row-${ri}`;
    const levelCls = level > 0 ? `level-${level}` : "";

    if (isSec) {
      currentSecId = `sec-${ri}`;
      currentSubId = null;
      html += `<tr class="row-sec" id="${currentSecId}" data-group="${currentSecId}" onclick="toggleGroup('${currentSecId}')">
        <td class="col-label" colspan="100"><span class="toggle-icon">▾</span>${label}</td>
      </tr>`;
      return;
    }

    if (isSub) {
      currentSubId = `sub-${ri}`;
      const parentGroup = currentSecId || "";
      html += `<tr class="row-sub ${parentGroup ? 'group-child group-of-'+currentSecId : ''}" 
                   id="${currentSubId}" data-group="${currentSubId}" data-parent="${parentGroup}"
                   onclick="toggleGroup('${currentSubId}')">
        <td class="col-label ${levelCls}" colspan="100"><span class="toggle-icon">▾</span>${label}</td>
      </tr>`;
      return;
    }

    // Data / total row
    const parentGroup = currentSubId || currentSecId || "";
    const rowCls = `${isTot ? 'row-tot' : 'row-dat'} ${levelCls} ${parentGroup ? 'group-child group-of-'+parentGroup : ''}`;
    altIdx++;

    let cells = `<td class="col-label">${label}</td>`;

    if (tab === "monthly" && row.monthly) {
      // Monthly columns
      row.monthly.forEach((m, i) => {
        const b = view === "ep_plano" ? m.ep_plano_budget : m.all_budget;
        const r = view === "ep_plano" ? m.ep_plano_real   : m.all_real;
        const v = pct(r, b);
        cells += `<td>${fmt(b, isTot)}</td><td>${fmt(r, isTot)}</td><td class="${v.cls}">${v.text}</td>`;
      });
      // YTD
      if (row.ytd) {
        const d = row.ytd[vk];
        const v = pct(d.real, d.budget);
        cells += `<td><b>${fmt(d.budget, isTot)}</b></td><td><b>${fmt(d.real, isTot)}</b></td><td class="${v.cls}"><b>${v.text}</b></td>`;
      }
      // Full Year
      if (row.fullYear) {
        const d = row.fullYear[vk];
        const v = pct(d.real, d.budget);
        cells += `<td><b>${fmt(d.budget, isTot)}</b></td><td><b>${fmt(d.real, isTot)}</b></td><td class="${v.cls}"><b>${v.text}</b></td>`;
      }
    } else {
      const src = tab === "ytd" ? row.ytd : row.fullYear;
      if (src) {
        const d = src[vk];
        const v = pct(d.real, d.budget);
        cells += `<td>${fmt(d.budget, isTot)}</td><td>${fmt(d.real, isTot)}</td><td class="${v.cls}">${v.text}</td>`;
      } else {
        cells += `<td>—</td><td>—</td><td>—</td>`;
      }
    }

    html += `<tr class="${rowCls}" id="${rowId}">${cells}</tr>`;
  });

  tbody.innerHTML = html;
}

// ── Collapse / Expand ──────────────────────────────────────────────────────────
function toggleGroup(groupId) {
  const headerRow = document.getElementById(groupId);
  if (!headerRow) return;
  const collapsed = headerRow.classList.toggle("collapsed");
  // Hide/show direct children of this group
  document.querySelectorAll(`.group-of-${groupId}`).forEach(tr => {
    if (collapsed) {
      tr.classList.add("group-hidden");
    } else {
      tr.classList.remove("group-hidden");
      // If this child is itself a collapsed sub-group, keep ITS children hidden
      if (tr.classList.contains("row-sub") && tr.classList.contains("collapsed")) {
        const childGroupId = tr.id;
        document.querySelectorAll(`.group-of-${childGroupId}`).forEach(c => c.classList.add("group-hidden"));
      }
    }
  });
}

// ── Search ─────────────────────────────────────────────────────────────────────
function doSearch(val) {
  searchTerm = val;
  if (data) renderBody();
}

// ── Overlay helpers ────────────────────────────────────────────────────────────
function showOverlay(msg) {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("overlayText").textContent = msg;
  document.getElementById("overlayError").style.display = "none";
}
function showError(msg) {
  document.getElementById("overlayText").textContent = "Failed to load";
  const e = document.getElementById("overlayError");
  e.style.display = "block";
  e.textContent = "Error: " + msg;
}
function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden");
}

// ── Boot ───────────────────────────────────────────────────────────────────────
fetchData();
</script>
